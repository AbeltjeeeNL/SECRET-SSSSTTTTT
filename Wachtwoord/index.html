<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABEL🔥💫💯</title>

  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;

      /* Achtergrond links rood, rechts geel */
      background: linear-gradient(
        to right,
        #ff0000 0%,
        #ff0000 50%,
        #ffd000 50%,
        #ffd000 100%
      );

      color: black; /* Tekst zwart */
    }

    .content {
      width: 80%;
      max-width: 900px;
      min-height: 400px;

      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);

      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 24px;

      padding: 40px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 20px;
      font-size: 2.5rem;
      color: black;
    }

    p {
      line-height: 1.7;
      font-size: 1.1rem;
      color: black;
    }
  </style>
</head>
<body>

  <div class="content">
    <h1>Abel (Westendorp)💫🔥</h1>

    <p>
      $ Whoami ---> Ja ik ben Abel tuff he ja.
    </p>
  </div>
</body>
</html>
